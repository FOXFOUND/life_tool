<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔐 非对称加密聊天 - 安全消息传输</title>
    <style>
        :root {
            --bg: #f0f2f5;
            --card-bg: #ffffff;
            --primary: #4a6cf7;
            --primary-hover: #3651d5;
            --success: #10b981;
            --success-hover: #059669;
            --danger: #ef4444;
            --danger-hover: #dc2626;
            --text: #1e293b;
            --text-secondary: #64748b;
            --border: #e2e8f0;
            --input-bg: #f8fafc;
            --tag-bg: #eef2ff;
            --tag-text: #4a6cf7;
            --shadow: 0 1px 3px rgba(0, 0, 0, 0.06), 0 1px 2px rgba(0, 0, 0, 0.04);
            --shadow-lg: 0 10px 25px rgba(0, 0, 0, 0.08), 0 4px 10px rgba(0, 0, 0, 0.04);
            --radius: 14px;
            --radius-sm: 10px;
            --transition: 0.2s ease;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            padding: 16px;
            -webkit-tap-highlight-color: transparent;
            -webkit-user-select: none;
            user-select: none;
        }

        .app-container {
            width: 100%;
            max-width: 520px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        /* 头部 */
        .header {
            text-align: center;
            padding: 20px 0 8px;
        }
        .header .icon {
            font-size: 48px;
            display: block;
            margin-bottom: 6px;
            animation: float 3s ease-in-out infinite;
        }
        @keyframes float {
            0%,
            100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-8px);
            }
        }
        .header h1 {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--text);
            letter-spacing: -0.02em;
        }
        .header .subtitle {
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-top: 2px;
        }

        /* 状态指示器 */
        .status-bar {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .status-chip {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 7px 14px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 500;
            background: #fff;
            border: 1px solid var(--border);
            box-shadow: var(--shadow);
            transition: var(--transition);
        }
        .status-chip .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            flex-shrink: 0;
        }
        .dot.green {
            background: #10b981;
            box-shadow: 0 0 6px rgba(16, 185, 129, 0.4);
        }
        .dot.red {
            background: #ef4444;
            box-shadow: 0 0 6px rgba(239, 68, 68, 0.4);
        }
        .dot.yellow {
            background: #f59e0b;
            box-shadow: 0 0 6px rgba(245, 158, 11, 0.4);
        }

        /* 卡片 */
        .card {
            background: var(--card-bg);
            border-radius: var(--radius);
            padding: 20px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
            transition: var(--transition);
        }
        .card:hover {
            box-shadow: var(--shadow-lg);
        }
        .card-header {
            font-weight: 600;
            font-size: 0.95rem;
            margin-bottom: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--text);
        }
        .card-header .emoji {
            font-size: 1.2rem;
        }

        /* 标签切换 */
        .tabs {
            display: flex;
            background: #e8ecf1;
            border-radius: 25px;
            padding: 4px;
            gap: 4px;
        }
        .tab-btn {
            flex: 1;
            padding: 10px 16px;
            border-radius: 21px;
            border: none;
            background: transparent;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.9rem;
            color: var(--text-secondary);
            transition: var(--transition);
            white-space: nowrap;
            letter-spacing: -0.01em;
        }
        .tab-btn.active {
            background: #fff;
            color: var(--primary);
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
        }
        .tab-btn:active {
            transform: scale(0.96);
        }

        /* 输入框 */
        textarea,
        input[type="text"] {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid var(--border);
            border-radius: var(--radius-sm);
            font-size: 0.95rem;
            font-family: inherit;
            background: var(--input-bg);
            color: var(--text);
            resize: vertical;
            transition: var(--transition);
            outline: none;
            -webkit-user-select: text;
            user-select: text;
        }
        textarea:focus,
        input[type="text"]:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(74, 108, 247, 0.1);
            background: #fff;
        }
        textarea {
            min-height: 80px;
            max-height: 200px;
        }
        .input-group {
            margin-bottom: 14px;
        }
        .input-group label {
            display: block;
            font-weight: 600;
            font-size: 0.82rem;
            margin-bottom: 6px;
            color: var(--text-secondary);
            letter-spacing: 0.01em;
        }

        /* 按钮 */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            padding: 11px 20px;
            border-radius: 25px;
            border: none;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            transition: var(--transition);
            white-space: nowrap;
            letter-spacing: -0.01em;
            min-width: 80px;
        }
        .btn:active {
            transform: scale(0.95);
            transition: 0.1s ease;
        }
        .btn-primary {
            background: var(--primary);
            color: #fff;
            box-shadow: 0 4px 14px rgba(74, 108, 247, 0.3);
        }
        .btn-primary:hover {
            background: var(--primary-hover);
            box-shadow: 0 6px 20px rgba(74, 108, 247, 0.4);
        }
        .btn-success {
            background: var(--success);
            color: #fff;
            box-shadow: 0 4px 14px rgba(16, 185, 129, 0.3);
        }
        .btn-success:hover {
            background: var(--success-hover);
            box-shadow: 0 6px 20px rgba(16, 185, 129, 0.4);
        }
        .btn-outline {
            background: #fff;
            color: var(--primary);
            border: 2px solid var(--primary);
        }
        .btn-outline:hover {
            background: #eef2ff;
        }
        .btn-sm {
            padding: 7px 14px;
            font-size: 0.78rem;
            border-radius: 20px;
            min-width: auto;
        }
        .btn-danger-sm {
            padding: 7px 14px;
            font-size: 0.78rem;
            border-radius: 20px;
            min-width: auto;
            background: #fef2f2;
            color: var(--danger);
            border: 2px solid #fecaca;
        }
        .btn-danger-sm:hover {
            background: #fef2f2;
            border-color: var(--danger);
        }
        .btn-row {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-top: 8px;
        }

        /* 输出区域 */
        .output-box {
            background: #f8fafc;
            border: 2px dashed var(--border);
            border-radius: var(--radius-sm);
            padding: 14px 16px;
            font-family: 'SF Mono', 'Fira Code', 'Consolas', 'Monaco', monospace;
            font-size: 0.82rem;
            word-break: break-all;
            color: var(--text);
            max-height: 150px;
            overflow-y: auto;
            -webkit-user-select: text;
            user-select: text;
            line-height: 1.5;
            transition: var(--transition);
        }
        .output-box:empty::before {
            content: '（等待操作...）';
            color: #cbd5e1;
            font-style: italic;
        }
        .output-box.has-content {
            border-color: var(--success);
            border-style: solid;
            background: #f0fdf6;
        }

        /* Toast */
        .toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(-120px);
            background: #1e293b;
            color: #fff;
            padding: 12px 24px;
            border-radius: 25px;
            font-weight: 600;
            font-size: 0.85rem;
            z-index: 999;
            pointer-events: none;
            opacity: 0;
            transition: all 0.35s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.25);
            white-space: nowrap;
        }
        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }
        .toast.success {
            background: #059669;
        }
        .toast.error {
            background: #dc2626;
        }

        /* 指纹 */
        .fingerprint {
            font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
            font-size: 0.75rem;
            color: var(--text-secondary);
            background: #f1f5f9;
            padding: 4px 10px;
            border-radius: 6px;
            letter-spacing: 0.05em;
        }

        /* 消息历史 */
        .msg-history {
            max-height: 250px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 8px;
            padding: 4px 0;
        }
        .msg-bubble {
            padding: 10px 14px;
            border-radius: 16px;
            font-size: 0.88rem;
            max-width: 85%;
            word-break: break-word;
            line-height: 1.5;
            animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(8px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .msg-bubble.sent {
            align-self: flex-end;
            background: #eef2ff;
            border-bottom-right-radius: 4px;
            color: #1e40af;
        }
        .msg-bubble.received {
            align-self: flex-start;
            background: #f0fdf6;
            border-bottom-left-radius: 4px;
            color: #065f46;
        }
        .msg-bubble .msg-meta {
            font-size: 0.7rem;
            color: #94a3b8;
            margin-top: 4px;
            text-align: right;
        }
        .msg-empty {
            text-align: center;
            color: #cbd5e1;
            padding: 30px 0;
            font-style: italic;
            font-size: 0.85rem;
        }

        /* 响应式 */
        @media (max-width: 400px) {
            .card {
                padding: 14px;
            }
            .btn {
                padding: 10px 16px;
                font-size: 0.82rem;
            }
            .tabs {
                border-radius: 20px;
            }
            .tab-btn {
                padding: 8px 10px;
                font-size: 0.78rem;
                border-radius: 16px;
            }
            .header h1 {
                font-size: 1.3rem;
            }
        }

        /* 滚动条美化 */
        ::-webkit-scrollbar {
            width: 4px;
            height: 4px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 4px;
        }

        /* 加载动画 */
        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid transparent;
            border-top-color: currentColor;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            vertical-align: middle;
        }
        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>

    <div class="app-container">
        <!-- 头部 -->
        <div class="header">
            <span class="icon">🔐</span>
            <h1>安全加密聊天</h1>
            <p class="subtitle">非对称加密 · 微信安全传输</p>
        </div>

        <!-- 状态栏 -->
        <div class="status-bar" id="statusBar">
            <span class="status-chip" id="chipMyKey">
                <span class="dot red"></span> 我的密钥：未生成
            </span>
            <span class="status-chip" id="chipPeerKey">
                <span class="dot red"></span> 对方公钥：未导入
            </span>
        </div>

        <!-- 标签切换 -->
        <div class="tabs">
            <button class="tab-btn active" data-tab="encrypt">🔒 加密发送</button>
            <button class="tab-btn" data-tab="decrypt">🔓 解密接收</button>
            <button class="tab-btn" data-tab="keys">⚙️ 密钥管理</button>
        </div>

        <!-- ========== 加密标签页 ========== -->
        <div class="tab-content" id="tab-encrypt">
            <div class="card">
                <div class="card-header"><span class="emoji">🔒</span> 加密消息（发送给对方）</div>
                <div class="input-group">
                    <label>📝 输入明文消息</label>
                    <textarea id="plaintextInput" placeholder="在此输入要加密的消息内容...&#10;&#10;支持中文、Emoji、任意文本"></textarea>
                </div>
                <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;">
                    <span style="font-size:0.75rem;color:var(--text-secondary);" id="charCount">0 字符</span>
                    <button class="btn btn-primary" id="btnEncrypt" disabled>
                        🔐 加密消息
                    </button>
                </div>
                <div style="margin-top:14px;">
                    <label style="font-weight:600;font-size:0.82rem;color:var(--text-secondary);">📤 加密密文（可复制到微信发送）</label>
                    <div class="output-box" id="ciphertextOutput"></div>
                </div>
                <div class="btn-row">
                    <button class="btn btn-sm btn-outline hidden" id="btnCopyCipher">📋 复制密文</button>
                    <button class="btn btn-sm btn-outline hidden" id="btnAddToHistory">💾 保存到历史</button>
                </div>
            </div>
        </div>

        <!-- ========== 解密标签页 ========== -->
        <div class="tab-content hidden" id="tab-decrypt">
            <div class="card">
                <div class="card-header"><span class="emoji">🔓</span> 解密消息（来自对方）</div>
                <div class="input-group">
                    <label>📥 粘贴加密密文</label>
                    <textarea id="ciphertextInput" placeholder="在此粘贴从微信收到的加密密文..."></textarea>
                </div>
                <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;">
                    <button class="btn btn-sm btn-outline" id="btnPasteFromClipboard">📋 从剪贴板粘贴</button>
                    <button class="btn btn-success" id="btnDecrypt" disabled>
                        🔓 解密消息
                    </button>
                </div>
                <div style="margin-top:14px;">
                    <label style="font-weight:600;font-size:0.82rem;color:var(--text-secondary);">📬 解密后的明文</label>
                    <div class="output-box" id="plaintextOutput"></div>
                </div>
                <div class="btn-row">
                    <button class="btn btn-sm btn-outline hidden" id="btnCopyPlain">📋 复制明文</button>
                </div>
            </div>
        </div>

        <!-- ========== 密钥管理标签页 ========== -->
        <div class="tab-content hidden" id="tab-keys">
            <!-- 我的密钥 -->
            <div class="card">
                <div class="card-header"><span class="emoji">🔑</span> 我的密钥对</div>
                <p style="font-size:0.8rem;color:var(--text-secondary);margin-bottom:12px;">
                    生成一对RSA-2048密钥。公钥分享给对方，私钥自己保管用于解密。
                </p>
                <button class="btn btn-primary" id="btnGenerateKeys">✨ 生成新的密钥对</button>
                <span style="margin-left:10px;font-size:0.78rem;color:var(--text-secondary);" id="keyGenStatus"></span>
                <div style="margin-top:12px;">
                    <label style="font-weight:600;font-size:0.8rem;">我的公钥指纹：</label>
                    <span class="fingerprint" id="myKeyFingerprint">—</span>
                </div>
                <div class="btn-row" style="margin-top:10px;">
                    <button class="btn btn-sm btn-outline hidden" id="btnCopyMyPubKey">📤 复制我的公钥</button>
                    <button class="btn btn-sm btn-outline hidden" id="btnExportPrivKey">💾 备份私钥</button>
                </div>
                <div id="privKeyExportArea" class="hidden" style="margin-top:10px;">
                    <label style="font-weight:600;font-size:0.78rem;color:var(--danger);">⚠️ 私钥（请安全保存，不要分享！）</label>
                    <div class="output-box" id="privKeyOutput" style="max-height:100px;font-size:0.7rem;"></div>
                    <button class="btn btn-sm btn-outline" id="btnCopyPrivKey" style="margin-top:6px;">📋 复制私钥</button>
                </div>
            </div>

            <!-- 对方公钥 -->
            <div class="card" style="margin-top:12px;">
                <div class="card-header"><span class="emoji">👤</span> 对方的公钥</div>
                <p style="font-size:0.8rem;color:var(--text-secondary);margin-bottom:12px;">
                    粘贴对方通过微信发送的公钥字符串。
                </p>
                <textarea id="peerPubKeyInput" placeholder="在此粘贴对方的公钥..." style="min-height:60px;font-size:0.78rem;"></textarea>
                <div class="btn-row">
                    <button class="btn btn-sm btn-primary" id="btnImportPeerKey">✅ 导入对方公钥</button>
                    <button class="btn btn-sm btn-outline" id="btnPastePeerKey">📋 粘贴</button>
                </div>
                <div style="margin-top:10px;">
                    <span style="font-size:0.78rem;">对方公钥指纹：</span>
                    <span class="fingerprint" id="peerKeyFingerprint">—</span>
                </div>
                <button class="btn btn-sm btn-danger-sm hidden" id="btnClearPeerKey" style="margin-top:8px;">🗑 清除对方公钥</button>
            </div>

            <!-- 导入私钥 -->
            <div class="card" style="margin-top:12px;">
                <div class="card-header"><span class="emoji">📥</span> 恢复私钥（换设备时使用）</div>
                <textarea id="importPrivKeyInput" placeholder="粘贴之前备份的私钥..." style="min-height:60px;font-size:0.78rem;"></textarea>
                <div class="btn-row">
                    <button class="btn btn-sm btn-outline" id="btnImportPrivKey">🔄 恢复私钥</button>
                    <button class="btn btn-sm btn-outline" id="btnPastePrivKey">📋 粘贴</button>
                </div>
            </div>
        </div>

        <!-- 消息历史 -->
        <div class="card">
            <div class="card-header">
                <span class="emoji">💬</span> 消息记录
                <button class="btn btn-sm btn-outline" id="btnClearHistory" style="margin-left:auto;">清空</button>
            </div>
            <div class="msg-history" id="msgHistory">
                <div class="msg-empty">暂无消息记录</div>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast"></div>

    <script>
        (function() {
            // ============ DOM元素 ============
            const $ = (sel) => document.querySelector(sel);
            const $$ = (sel) => document.querySelectorAll(sel);

            // 标签
            const tabBtns = $$('.tab-btn');
            const tabContents = {
                encrypt: $('#tab-encrypt'),
                decrypt: $('#tab-decrypt'),
                keys: $('#tab-keys'),
            };

            // 状态
            const chipMyKey = $('#chipMyKey');
            const chipPeerKey = $('#chipPeerKey');
            const myKeyFingerprint = $('#myKeyFingerprint');
            const peerKeyFingerprint = $('#peerKeyFingerprint');
            const keyGenStatus = $('#keyGenStatus');

            // 加密页
            const plaintextInput = $('#plaintextInput');
            const ciphertextOutput = $('#ciphertextOutput');
            const btnEncrypt = $('#btnEncrypt');
            const btnCopyCipher = $('#btnCopyCipher');
            const btnAddToHistory = $('#btnAddToHistory');
            const charCount = $('#charCount');

            // 解密页
            const ciphertextInput = $('#ciphertextInput');
            const plaintextOutput = $('#plaintextOutput');
            const btnDecrypt = $('#btnDecrypt');
            const btnCopyPlain = $('#btnCopyPlain');
            const btnPasteFromClipboard = $('#btnPasteFromClipboard');

            // 密钥页
            const btnGenerateKeys = $('#btnGenerateKeys');
            const btnCopyMyPubKey = $('#btnCopyMyPubKey');
            const btnExportPrivKey = $('#btnExportPrivKey');
            const privKeyExportArea = $('#privKeyExportArea');
            const privKeyOutput = $('#privKeyOutput');
            const btnCopyPrivKey = $('#btnCopyPrivKey');
            const peerPubKeyInput = $('#peerPubKeyInput');
            const btnImportPeerKey = $('#btnImportPeerKey');
            const btnPastePeerKey = $('#btnPastePeerKey');
            const btnClearPeerKey = $('#btnClearPeerKey');
            const importPrivKeyInput = $('#importPrivKeyInput');
            const btnImportPrivKey = $('#btnImportPrivKey');
            const btnPastePrivKey = $('#btnPastePrivKey');

            // 历史
            const msgHistory = $('#msgHistory');
            const btnClearHistory = $('#btnClearHistory');

            // Toast
            const toast = $('#toast');

            // ============ 常量 ============
            const STORAGE_MY_PRIV_KEY = 'asym_chat_my_priv_key_jwk';
            const STORAGE_MY_PUB_KEY = 'asym_chat_my_pub_key_jwk';
            const STORAGE_PEER_PUB_KEY = 'asym_chat_peer_pub_key_jwk';
            const STORAGE_MESSAGE_HISTORY = 'asym_chat_message_history';
            const RSA_ALGORITHM = {
                name: 'RSA-OAEP',
                modulusLength: 2048,
                publicExponent: new Uint8Array([1, 0, 1]), // 65537
                hash: 'SHA-256',
            };
            const AES_ALGORITHM = {
                name: 'AES-GCM',
                length: 256,
            };

            // ============ 状态变量 ============
            let myKeyPair = null; // { publicKey: CryptoKey, privateKey: CryptoKey }
            let peerPublicKey = null; // CryptoKey
            let messageHistory = [];

            // ============ 工具函数 ============
            function arrayBufferToBase64(buffer) {
                const bytes = new Uint8Array(buffer);
                let binary = '';
                const chunkSize = 8192;
                for (let i = 0; i < bytes.length; i += chunkSize) {
                    const chunk = bytes.subarray(i, i + chunkSize);
                    binary += String.fromCharCode.apply(null, chunk);
                }
                return btoa(binary);
            }

            function base64ToArrayBuffer(base64) {
                const binary = atob(base64);
                const bytes = new Uint8Array(binary.length);
                for (let i = 0; i < binary.length; i++) {
                    bytes[i] = binary.charCodeAt(i);
                }
                return bytes.buffer;
            }

            function base64ToUint8Array(base64) {
                return new Uint8Array(base64ToArrayBuffer(base64));
            }

            async function sha256Fingerprint(data) {
                const hashBuffer = await crypto.subtle.digest('SHA-256', data);
                const hashArray = Array.from(new Uint8Array(hashBuffer));
                return hashArray.slice(0, 8).map(b => b.toString(16).padStart(2, '0')).join(':');
            }

                    // 更新指纹

                        const publicKey = await crypto.subtle.importKey('jwk', pubJwk, RSA_ALGORITHM, true, [
                            'encrypt'
                        ]);
                        myKeyPair = { privateKey, publicKey };
                        const pubSpki = await crypto.subtle.exportKey('spki', publicKey);

            async function importMyPrivateKey(privKeyBase64) {
                try {
                    const buffer = base64ToArrayBuffer(privKeyBase64.trim());
                    const privateKey = await crypto.subtle.importKey('pkcs8', buffer, RSA_ALGORITHM, true, [
                        'decrypt'
                    ]);
                    // 从私钥推导公钥 - 需要重新生成或从存储中获取
                    // 实际上从PKCS8可以提取公钥信息
                    // 这里我们使用一个技巧：先用私钥的JWK来重建公钥
                    const privJwk = await crypto.subtle.exportKey('jwk', privateKey);
                    const pubJwk = {
                        kty: privJwk.kty,
                        n: privJwk.n,
                        e: privJwk.e,
                        alg: privJwk.alg,
                        ext: true,
                    };
                    const publicKey = await crypto.subtle.importKey('jwk', pubJwk, RSA_ALGORITHM, true, [
                        'encrypt'
                    ]);
                    myKeyPair = { privateKey, publicKey };
                    saveToStorage(STORAGE_MY_PRIV_KEY, privJwk);
                    saveToStorage(STORAGE_MY_PUB_KEY, pubJwk);
                    const pubSpki = await crypto.subtle.exportKey('spki', publicKey);

            // ============ 混合加密 ============
            async function hybridEncrypt(plaintext, recipientPublicKey) {
                // 1. 生成随机AES-256密钥
                const aesKey = await crypto.subtle.generateKey(AES_ALGORITHM, true, ['encrypt']);
                // 2. 生成随机IV (12字节)
                const iv = crypto.getRandomValues(new Uint8Array(12));
                // 3. 用AES-GCM加密消息
                const encoder = new TextEncoder();
                const plaintextBytes = encoder.encode(plaintext);
                const aesCiphertext = await crypto.subtle.encrypt({ name: 'AES-GCM', iv: iv }, aesKey,
                plaintextBytes);
                // aesCiphertext 包含密文+16字节认证标签
                // 4. 导出AES密钥并用RSA加密
                const aesKeyRaw = await crypto.subtle.exportKey('raw', aesKey);
                const encryptedAesKey = await crypto.subtle.encrypt({ name: 'RSA-OAEP' }, recipientPublicKey,
                    aesKeyRaw);
                // 5. 打包
                const pack = {
                    v: 1,
                    encKey: arrayBufferToBase64(encryptedAesKey),
                    iv: arrayBufferToBase64(iv.buffer),
                    ct: arrayBufferToBase64(aesCiphertext),
                };
                return btoa(JSON.stringify(pack));
            }

            async function hybridDecrypt(packedBase64, myPrivateKey) {
                // 1. 解包
                const jsonStr = atob(packedBase64.trim());
                const pack = JSON.parse(jsonStr);
                if (pack.v !== 1) throw new Error('不支持的打包版本');
                const encryptedAesKey = base64ToArrayBuffer(pack.encKey);
                const iv = base64ToUint8Array(pack.iv);
                const aesCiphertext = base64ToArrayBuffer(pack.ct);
                // 2. 用RSA私钥解密AES密钥
                const aesKeyRaw = await crypto.subtle.decrypt({ name: 'RSA-OAEP' }, myPrivateKey,
                encryptedAesKey);
                const aesKey = await crypto.subtle.importKey('raw', aesKeyRaw, AES_ALGORITHM, false, ['decrypt']);
                // 3. 用AES-GCM解密消息
                const plaintextBuffer = await crypto.subtle.decrypt({ name: 'AES-GCM', iv: iv }, aesKey,
                    aesCiphertext);
                const decoder = new TextDecoder();
                return decoder.decode(plaintextBuffer);
            }

            // ============ 剪贴板辅助 ============
            async function copyToClipboard(text) {
                try {
                    if (navigator.clipboard && navigator.clipboard.writeText) {
                        await navigator.clipboard.writeText(text);
                    } else {
                        // 降级方案
                        const textarea = document.createElement('textarea');
                        textarea.value = text;
                        textarea.style.position = 'fixed';
                        textarea.style.left = '-9999px';
                        textarea.style.top = '-9999px';
                        document.body.appendChild(textarea);
                        textarea.focus();
                        textarea.select();
                        document.execCommand('copy');
                        document.body.removeChild(textarea);
                    }
                } catch (err) {
                    // 再次降级
                    const textarea = document.createElement('textarea');
                    textarea.value = text;
                    textarea.style.position = 'fixed';
                    textarea.style.left = '-9999px';
                    textarea.style.top = '-9999px';
                    document.body.appendChild(textarea);
                    textarea.focus();
                    textarea.select();
                    document.execCommand('copy');
                    document.body.removeChild(textarea);
                }
            }

            async function readFromClipboard() {
                try {
                    if (navigator.clipboard && navigator.clipboard.readText) {
                        return await navigator.clipboard.readText();
                    }
                } catch (err) {
                    // 降级：提示用户手动粘贴
                }
                showToast('⚠️ 请手动粘贴（Ctrl+V / 长按粘贴）', 'error');
                return null;
            }

            // ============ 初始化 ============

                // 加载存储的数据
                await loadMyKeyPair();
                await loadPeerPublicKey();
                loadMessageHistory();
                renderMessageHistory();
                updateStatusChips();
                updateEncryptButton();
                updateDecryptButton();
                updateCharCount();

                // 初始按钮状态
                btnImportPeerKey.disabled = !peerPubKeyInput.value.trim();
                btnImportPrivKey.disabled = !importPrivKeyInput.value.trim();

                if (!myKeyPair) {
                    showToast('💡 请先在"密钥管理"中生成密钥对', '');
                } else if (!peerPublicKey) {
                    showToast('💡 请导入对方的公钥以开始加密通信', '');
                } else {
                    showToast('✅ 一切就绪，可以开始加密通信！', 'success');
                }

                console.log('🔐 非对称加密聊天程序已就绪');
                console.log('  我的密钥:', myKeyPair ? '✅ 已加载' : '❌ 未生成');
                console.log('  对方公钥:', peerPublicKey ? '✅ 已加载' : '❌ 未导入');
                console.log('  消息历史:', messageHistory.length, '条');
                console.log('  💡 使用方法:');
                console.log('    1. 生成密钥对 → 复制公钥 → 通过微信发给对方');
                console.log('    2. 收到对方公钥 → 粘贴导入');
                console.log('    3. 输入消息 → 加密 → 复制密文 → 微信发送');
                console.log('    4. 收到密文 → 粘贴 → 解密 → 阅读消息');
            }

            init();
        })();
    </script>
</body>
</html>
