<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>🔐 多人加密聊天 · 公钥管理</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
      background: #f5f7fb;
      color: #1e293b;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }
    .app {
      width: 100%;
      max-width: 520px;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      padding-bottom: 80px;
    }
    /* 头部 */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      background: #fff;
      border-radius: 24px;
      padding: 14px 20px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.04);
    }
    .header .key-status {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.8rem;
      font-weight: 500;
      color: #475569;
    }
    .status-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #ef4444;
      flex-shrink: 0;
    }
    .status-dot.ready { background: #10b981; box-shadow: 0 0 8px rgba(16,185,129,0.4); }
    .header .actions {
      display: flex;
      gap: 8px;
    }
    .icon-btn {
      background: #f1f5f9;
      border: none;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      font-size: 1.2rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: 0.2s;
      color: #334155;
    }
    .icon-btn:active { background: #e2e8f0; transform: scale(0.94); }

    /* 联系人区域 */
    .contacts-section {
      background: #fff;
      border-radius: 24px;
      padding: 16px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.04);
    }
    .section-title {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }
    .section-title span {
      font-weight: 600;
      font-size: 0.9rem;
      color: #334155;
    }
    .add-contact-btn {
      background: #4a6cf7;
      color: #fff;
      border: none;
      width: 32px;
      height: 32px;
      border-radius: 50%;
      font-size: 1.3rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 10px rgba(74,108,247,0.3);
      transition: 0.2s;
    }
    .add-contact-btn:active { transform: scale(0.92); }
    .contact-list {
      display: flex;
      gap: 10px;
      overflow-x: auto;
      padding: 4px 0 8px;
      scrollbar-width: thin;
      scrollbar-color: #cbd5e1 transparent;
    }
    .contact-list::-webkit-scrollbar { height: 4px; }
    .contact-list::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
    .contact-chip {
      flex-shrink: 0;
      padding: 10px 18px;
      background: #f8fafc;
      border: 2px solid #e2e8f0;
      border-radius: 30px;
      font-weight: 500;
      font-size: 0.85rem;
      cursor: pointer;
      transition: 0.2s;
      white-space: nowrap;
      display: flex;
      align-items: center;
      gap: 6px;
      color: #475569;
      position: relative;
    }
    .contact-chip.active {
      background: #eef2ff;
      border-color: #4a6cf7;
      color: #4a6cf7;
      font-weight: 600;
      box-shadow: 0 2px 8px rgba(74,108,247,0.15);
    }
    .contact-chip .delete-contact {
      margin-left: 4px;
      font-size: 0.9rem;
      opacity: 0.5;
      cursor: pointer;
      padding: 0 2px;
    }
    .contact-chip .delete-contact:hover { opacity: 1; color: #ef4444; }
    .empty-contacts {
      text-align: center;
      color: #94a3b8;
      font-size: 0.8rem;
      padding: 12px;
      width: 100%;
    }

    /* 聊天窗口 */
    .chat-window {
      background: #fff;
      border-radius: 24px;
      flex: 1;
      display: flex;
      flex-direction: column;
      box-shadow: 0 2px 12px rgba(0,0,0,0.04);
      overflow: hidden;
    }
    .chat-header {
      padding: 16px 20px;
      border-bottom: 1px solid #f1f5f9;
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 600;
      font-size: 0.95rem;
    }
    .chat-header .contact-avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: #e0e7ff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.2rem;
    }
    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      max-height: 320px;
      min-height: 150px;
      background: #fafbfc;
    }
    .msg-bubble {
      max-width: 80%;
      padding: 10px 14px;
      border-radius: 18px;
      font-size: 0.9rem;
      line-height: 1.5;
      word-break: break-word;
      animation: fadeIn 0.25s ease;
    }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    .msg-bubble.outgoing {
      align-self: flex-end;
      background: #eef2ff;
      border-bottom-right-radius: 4px;
      color: #1e3a8a;
    }
    .msg-bubble.incoming {
      align-self: flex-start;
      background: #f0fdf6;
      border-bottom-left-radius: 4px;
      color: #065f46;
    }
    .msg-meta {
      font-size: 0.65rem;
      color: #94a3b8;
      margin-top: 4px;
      text-align: right;
    }
    .empty-chat {
      color: #cbd5e1;
      text-align: center;
      padding: 30px;
      font-style: italic;
    }

    /* 输入区域 */
    .compose-area {
      padding: 14px 16px;
      border-top: 1px solid #f1f5f9;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .compose-area textarea {
      width: 100%;
      padding: 12px;
      border: 2px solid #e2e8f0;
      border-radius: 18px;
      font-family: inherit;
      font-size: 0.9rem;
      resize: none;
      outline: none;
      background: #fff;
      min-height: 44px;
      max-height: 100px;
      background: #f8fafc;
      transition: 0.2s;
    }
    .compose-area textarea:focus {
      border-color: #4a6cf7;
      background: #fff;
    }
    .btn-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .btn {
      padding: 10px 18px;
      border-radius: 25px;
      border: none;
      font-weight: 600;
      font-size: 0.8rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: 0.2s;
      white-space: nowrap;
    }
    .btn:active { transform: scale(0.95); }
    .btn-primary { background: #4a6cf7; color: #fff; box-shadow: 0 4px 12px rgba(74,108,247,0.3); }
    .btn-outline { background: #fff; border: 2px solid #4a6cf7; color: #4a6cf7; }
    .btn-sm { padding: 6px 14px; font-size: 0.75rem; }
    .btn:disabled { opacity: 0.5; pointer-events: none; }

    /* 密文输出区域 */
    .cipher-output {
      background: #f1f5f9;
      border-radius: 14px;
      padding: 12px;
      font-size: 0.75rem;
      word-break: break-all;
      font-family: monospace;
      max-height: 80px;
      overflow-y: auto;
      color: #334155;
      border: 2px dashed #cbd5e1;
      margin-top: 6px;
    }
    .cipher-output:empty::after {
      content: '密文将显示在这里';
      color: #94a3b8;
      font-style: italic;
    }

    /* 弹窗 */
    .modal {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.4);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 10;
      backdrop-filter: blur(4px);
    }
    .modal.hidden { display: none; }
    .modal-content {
      background: #fff;
      border-radius: 24px;
      padding: 24px;
      width: 90%;
      max-width: 340px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.2);
    }
    .modal-content h3 { margin-bottom: 16px; }
    .modal-content input {
      width: 100%;
      padding: 12px;
      border: 2px solid #e2e8f0;
      border-radius: 14px;
      margin-bottom: 12px;
      font-size: 0.9rem;
      outline: none;
    }
    .modal-content input:focus { border-color: #4a6cf7; }
    .modal-actions { display: flex; gap: 8px; justify-content: flex-end; }

    .toast {
      position: fixed;
      top: 20px; left: 50%; transform: translateX(-50%);
      background: #1e293b; color: #fff;
      padding: 10px 24px; border-radius: 25px;
      font-weight: 500; font-size: 0.85rem;
      z-index: 20; opacity: 0; transition: 0.3s;
      pointer-events: none;
    }
    .toast.show { opacity: 1; }
    .toast.success { background: #059669; }
    .toast.error { background: #dc2626; }
  </style>
</head>
<body>
<div class="app">
  <!-- 头部密钥状态 -->
  <div class="header">
    <div class="key-status" id="myKeyStatus">
      <span class="status-dot" id="myKeyDot"></span>
      <span id="myKeyLabel">密钥未生成</span>
    </div>
    <div class="actions">
      <button class="icon-btn" id="btnKeyMgr" title="密钥管理">🔑</button>
    </div>
  </div>

  <!-- 联系人选择区 -->
  <div class="contacts-section">
    <div class="section-title">
      <span>👥 联系人</span>
      <button class="add-contact-btn" id="btnAddContact">+</button>
    </div>
    <div class="contact-list" id="contactList"></div>
  </div>

  <!-- 聊天窗口 -->
  <div class="chat-window" id="chatWindow">
    <div class="chat-header" id="chatHeader">
      <div class="contact-avatar">💬</div>
      <span id="chatContactName">选择联系人</span>
    </div>
    <div class="chat-messages" id="chatMessages">
      <div class="empty-chat">请选择一个联系人开始聊天</div>
    </div>
    <div class="compose-area">
      <textarea id="messageInput" placeholder="输入消息..." disabled></textarea>
      <div class="btn-row">
        <button class="btn btn-primary" id="btnEncryptSend" disabled>🔐 加密发送</button>
        <button class="btn btn-outline btn-sm" id="btnPasteDecrypt" disabled>📋 粘贴密文解密</button>
      </div>
      <div class="cipher-output" id="cipherOutput"></div>
      <div class="btn-row" style="margin-top:4px;">
        <button class="btn btn-sm btn-outline hidden" id="btnCopyCipher">复制密文</button>
      </div>
    </div>
  </div>
</div>

<!-- 添加/编辑联系人弹窗 -->
<div class="modal hidden" id="contactModal">
  <div class="modal-content">
    <h3 id="modalTitle">添加联系人</h3>
    <input type="text" id="contactNameInput" placeholder="联系人名称" autocomplete="off">
    <input type="text" id="contactPubKeyInput" placeholder="粘贴对方公钥 (Base64)">
    <div class="modal-actions">
      <button class="btn btn-outline btn-sm" id="btnCancelModal">取消</button>
      <button class="btn btn-primary btn-sm" id="btnSaveContact">保存</button>
    </div>
  </div>
</div>

<!-- 密钥管理弹窗 -->
<div class="modal hidden" id="keyModal">
  <div class="modal-content">
    <h3>🔑 我的密钥管理</h3>
    <p style="font-size:0.8rem;color:#475569;margin-bottom:12px;">RSA-2048 密钥对，用于解密所有联系人的消息。</p>
    <button class="btn btn-primary" id="btnGenerateKey" style="width:100%;margin-bottom:12px;">✨ 生成新密钥对</button>
    <div style="display:flex;gap:8px;margin-bottom:12px;">
      <button class="btn btn-outline btn-sm" id="btnCopyMyPub">复制公钥</button>
      <button class="btn btn-outline btn-sm" id="btnExportPriv">备份私钥</button>
    </div>
    <div id="privKeyArea" class="hidden" style="margin-top:12px;">
      <p style="font-size:0.75rem;color:#ef4444;">⚠️ 私钥（请安全保存）</p>
      <div class="cipher-output" id="privKeyDisplay" style="max-height:60px;"></div>
      <button class="btn btn-sm btn-outline" id="btnCopyPriv" style="margin-top:6px;">复制私钥</button>
    </div>
    <hr style="margin:16px 0;border-color:#e2e8f0;">
    <p style="font-size:0.8rem;color:#475569;">恢复私钥（换设备）</p>
    <input type="text" id="importPrivInput" placeholder="粘贴备份的私钥">
    <button class="btn btn-outline btn-sm" id="btnImportPriv" style="width:100%;">恢复私钥</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  (() => {
    // ========== 常量 ==========
    const STORAGE_CONTACTS = 'asym_chat_contacts_v2';
    const STORAGE_MY_PRIV = 'asym_chat_my_priv_jwk';
    const STORAGE_MY_PUB = 'asym_chat_my_pub_jwk';
    const STORAGE_HISTORY_PREFIX = 'asym_chat_history_';

    const RSA_PARAMS = {
      name: 'RSA-OAEP',
      modulusLength: 2048,
      publicExponent: new Uint8Array([1,0,1]),
      hash: 'SHA-256',
    };
    const AES_PARAMS = { name: 'AES-GCM', length: 256 };

    // ========== DOM 引用 ==========
    const $ = (s) => document.querySelector(s);
    const $$ = (s) => document.querySelectorAll(s);

    const myKeyDot = $('#myKeyDot');
    const myKeyLabel = $('#myKeyLabel');
    const contactList = $('#contactList');
    const chatMessages = $('#chatMessages');
    const chatContactName = $('#chatContactName');
    const messageInput = $('#messageInput');
    const btnEncryptSend = $('#btnEncryptSend');
    const btnPasteDecrypt = $('#btnPasteDecrypt');
    const cipherOutput = $('#cipherOutput');
    const btnCopyCipher = $('#btnCopyCipher');
    const toast = $('#toast');

    const contactModal = $('#contactModal');
    const contactNameInput = $('#contactNameInput');
    const contactPubKeyInput = $('#contactPubKeyInput');
    const modalTitle = $('#modalTitle');
    const btnSaveContact = $('#btnSaveContact');

    const keyModal = $('#keyModal');
    const privKeyArea = $('#privKeyArea');
    const privKeyDisplay = $('#privKeyDisplay');
    const importPrivInput = $('#importPrivInput');

    // ========== 状态 ==========
    let contacts = [];               // { id, name, pubKeyBase64 }
    let currentContactId = null;
    let myKeyPair = null;           // { publicKey, privateKey }
    let editingContactId = null;   // 用于编辑

    // ========== 工具函数 ==========
    function arrayBufferToBase64(buffer) {
      const bytes = new Uint8Array(buffer);
      let binary = '';
      bytes.forEach(b => binary += String.fromCharCode(b));
      return btoa(binary);
    }
    function base64ToArrayBuffer(base64) {
      const binary = atob(base64);
      const bytes = new Uint8Array(binary.length);
      for (let i=0; i<binary.length; i++) bytes[i] = binary.charCodeAt(i);
      return bytes.buffer;
    }

    function showToast(msg, type='') {
      toast.textContent = msg;
      toast.className = `toast ${type} show`;
      clearTimeout(toast._t);
      toast._t = setTimeout(() => toast.classList.remove('show'), 2200);
    }

    async function copyText(text) {
      try {
        await navigator.clipboard.writeText(text);
        showToast('✅ 已复制到剪贴板','success');
      } catch {
        const ta = document.createElement('textarea');
        ta.value = text; document.body.appendChild(ta);
        ta.select(); document.execCommand('copy');
        document.body.removeChild(ta);
        showToast('📋 已复制','success');
      }
    }

    // ========== 持久化 ==========
    function saveContacts() {
      localStorage.setItem(STORAGE_CONTACTS, JSON.stringify(contacts));
    }
    function loadContacts() {
      const raw = localStorage.getItem(STORAGE_CONTACTS);
      if (raw) {
        try { contacts = JSON.parse(raw); } catch { contacts = []; }
      }
    }
    function getHistoryKey(contactId) { return STORAGE_HISTORY_PREFIX + contactId; }
    function loadChatHistory(contactId) {
      const raw = localStorage.getItem(getHistoryKey(contactId));
      return raw ? JSON.parse(raw) : [];
    }
    function saveChatHistory(contactId, history) {
      localStorage.setItem(getHistoryKey(contactId), JSON.stringify(history.slice(-50)));
    }

    // ========== 密钥管理 ==========
    async function generateMyKeyPair() {
      const keyPair = await crypto.subtle.generateKey(RSA_PARAMS, true, ['encrypt','decrypt']);
      myKeyPair = keyPair;
      const privJwk = await crypto.subtle.exportKey('jwk', keyPair.privateKey);
      const pubJwk = await crypto.subtle.exportKey('jwk', keyPair.publicKey);
      localStorage.setItem(STORAGE_MY_PRIV, JSON.stringify(privJwk));
      localStorage.setItem(STORAGE_MY_PUB, JSON.stringify(pubJwk));
      updateMyKeyStatus();
      updateUIForCurrentContact();
      showToast('✅ 密钥对已生成','success');
    }

    async function loadMyKeyPair() {
      const privRaw = localStorage.getItem(STORAGE_MY_PRIV);
      const pubRaw = localStorage.getItem(STORAGE_MY_PUB);
      if (!privRaw || !pubRaw) return false;
      try {
        const privJwk = JSON.parse(privRaw);
        const pubJwk = JSON.parse(pubRaw);
        const privateKey = await crypto.subtle.importKey('jwk', privJwk, RSA_PARAMS, true, ['decrypt']);
        const publicKey = await crypto.subtle.importKey('jwk', pubJwk, RSA_PARAMS, true, ['encrypt']);
        myKeyPair = { privateKey, publicKey };
        return true;
      } catch { return false; }
    }

    async function exportMyPubBase64() {
      if (!myKeyPair) return null;
      const spki = await crypto.subtle.exportKey('spki', myKeyPair.publicKey);
      return arrayBufferToBase64(spki);
    }

    async function exportMyPrivBase64() {
      if (!myKeyPair) return null;
      const pkcs8 = await crypto.subtle.exportKey('pkcs8', myKeyPair.privateKey);
      return arrayBufferToBase64(pkcs8);
    }

    async function importMyPrivKey(base64) {
      const buffer = base64ToArrayBuffer(base64.trim());
      const privateKey = await crypto.subtle.importKey('pkcs8', buffer, RSA_PARAMS, true, ['decrypt']);
      const privJwk = await crypto.subtle.exportKey('jwk', privateKey);
      const pubJwk = { kty: privJwk.kty, n: privJwk.n, e: privJwk.e, alg: privJwk.alg, ext: true };
      const publicKey = await crypto.subtle.importKey('jwk', pubJwk, RSA_PARAMS, true, ['encrypt']);
      myKeyPair = { privateKey, publicKey };
      localStorage.setItem(STORAGE_MY_PRIV, JSON.stringify(privJwk));
      localStorage.setItem(STORAGE_MY_PUB, JSON.stringify(pubJwk));
      updateMyKeyStatus();
      updateUIForCurrentContact();
    }

    function updateMyKeyStatus() {
      if (myKeyPair) {
        myKeyDot.className = 'status-dot ready';
        myKeyLabel.textContent = '密钥已就绪';
      } else {
        myKeyDot.className = 'status-dot';
        myKeyLabel.textContent = '密钥未生成';
      }
    }

    // ========== 联系人管理 ==========
    function renderContactList() {
      contactList.innerHTML = '';
      if (contacts.length === 0) {
        contactList.innerHTML = '<div class="empty-contacts">暂无联系人，点击 + 添加</div>';
        return;
      }
      contacts.forEach(c => {
        const chip = document.createElement('div');
        chip.className = `contact-chip ${c.id === currentContactId ? 'active' : ''}`;
        chip.innerHTML = `
          <span>${escapeHtml(c.name)}</span>
          <span class="delete-contact" data-id="${c.id}">✕</span>
        `;
        chip.addEventListener('click', (e) => {
          if (e.target.classList.contains('delete-contact')) {
            e.stopPropagation();
            deleteContact(c.id);
          } else {
            selectContact(c.id);
          }
        });
        contactList.appendChild(chip);
      });
    }

    function selectContact(id) {
      currentContactId = id;
      renderContactList();
      renderChatWindow();
    }

    function deleteContact(id) {
      if (!confirm('删除该联系人及其所有聊天记录？')) return;
      contacts = contacts.filter(c => c.id !== id);
      localStorage.removeItem(getHistoryKey(id));
      saveContacts();
      if (currentContactId === id) {
        currentContactId = contacts.length > 0 ? contacts[0].id : null;
      }
      renderContactList();
      renderChatWindow();
      showToast('联系人已删除');
    }

    function openAddContactModal() {
      editingContactId = null;
      modalTitle.textContent = '添加联系人';
      contactNameInput.value = '';
      contactPubKeyInput.value = '';
      contactModal.classList.remove('hidden');
    }

    function openEditContactModal(contact) {
      editingContactId = contact.id;
      modalTitle.textContent = '编辑联系人';
      contactNameInput.value = contact.name;
      contactPubKeyInput.value = contact.pubKeyBase64 || '';
      contactModal.classList.remove('hidden');
    }

    async function saveContactFromModal() {
      const name = contactNameInput.value.trim();
      const pubKeyB64 = contactPubKeyInput.value.trim();
      if (!name) return showToast('请输入名称','error');
      if (!pubKeyB64) return showToast('请粘贴公钥','error');
      // 验证公钥格式
      try {
        const buffer = base64ToArrayBuffer(pubKeyB64);
        await crypto.subtle.importKey('spki', buffer, RSA_PARAMS, true, ['encrypt']);
      } catch {
        return showToast('公钥格式无效','error');
      }
      if (editingContactId) {
        const idx = contacts.findIndex(c => c.id === editingContactId);
        if (idx !== -1) {
          contacts[idx].name = name;
          contacts[idx].pubKeyBase64 = pubKeyB64;
        }
      } else {
        const newContact = {
          id: Date.now().toString(36) + Math.random().toString(36).slice(2,6),
          name,
          pubKeyBase64: pubKeyB64,
        };
        contacts.push(newContact);
        currentContactId = newContact.id;
      }
      saveContacts();
      contactModal.classList.add('hidden');
      renderContactList();
      if (currentContactId) renderChatWindow();
      showToast('联系人已保存','success');
    }

    // ========== 聊天窗口渲染 ==========
    function renderChatWindow() {
      const contact = contacts.find(c => c.id === currentContactId);
      if (!contact) {
        chatContactName.textContent = '选择联系人';
        chatMessages.innerHTML = '<div class="empty-chat">请选择一个联系人开始聊天</div>';
        messageInput.disabled = true;
        btnEncryptSend.disabled = true;
        btnPasteDecrypt.disabled = true;
        cipherOutput.textContent = '';
        btnCopyCipher.classList.add('hidden');
        return;
      }
      chatContactName.textContent = contact.name;
      messageInput.disabled = false;
      updateUIForCurrentContact();
      renderMessageHistory(contact.id);
    }

    function renderMessageHistory(contactId) {
      const history = loadChatHistory(contactId);
      if (history.length === 0) {
        chatMessages.innerHTML = '<div class="empty-chat">暂无消息，开始加密对话吧</div>';
        return;
      }
      chatMessages.innerHTML = history.map(msg => {
        const cls = msg.direction === 'out' ? 'outgoing' : 'incoming';
        const label = msg.direction === 'out' ? '📤 发送' : '📥 接收';
        return `<div class="msg-bubble ${cls}">
          ${escapeHtml(msg.text)}
          <div class="msg-meta">${label} · ${msg.time}</div>
        </div>`;
      }).join('');
      chatMessages.scrollTop = chatMessages.scrollHeight;
    }

    function addMessageToHistory(contactId, text, direction) {
      const history = loadChatHistory(contactId);
      history.push({
        text,
        direction,
        time: new Date().toLocaleString('zh-CN', { month:'short', day:'numeric', hour:'2-digit', minute:'2-digit' })
      });
      saveChatHistory(contactId, history);
      renderMessageHistory(contactId);
    }

    function updateUIForCurrentContact() {
      const hasMyKey = !!myKeyPair;
      const hasContact = !!currentContactId && contacts.some(c => c.id === currentContactId);
      btnEncryptSend.disabled = !(hasMyKey && hasContact);
      btnPasteDecrypt.disabled = !hasMyKey || !hasContact;
      if (!hasContact) {
        cipherOutput.textContent = '';
        btnCopyCipher.classList.add('hidden');
      }
    }

    // ========== 加密/解密核心 ==========
    async function getContactPublicKey(contactId) {
      const contact = contacts.find(c => c.id === contactId);
      if (!contact) throw new Error('联系人不存在');
      const buffer = base64ToArrayBuffer(contact.pubKeyBase64);
      return await crypto.subtle.importKey('spki', buffer, RSA_PARAMS, true, ['encrypt']);
    }

    async function hybridEncrypt(plaintext, recipientPubKey) {
      const aesKey = await crypto.subtle.generateKey(AES_PARAMS, true, ['encrypt']);
      const iv = crypto.getRandomValues(new Uint8Array(12));
      const encoder = new TextEncoder();
      const plainBytes = encoder.encode(plaintext);
      const aesCt = await crypto.subtle.encrypt({ name: 'AES-GCM', iv }, aesKey, plainBytes);
      const rawAesKey = await crypto.subtle.exportKey('raw', aesKey);
      const encAesKey = await crypto.subtle.encrypt({ name: 'RSA-OAEP' }, recipientPubKey, rawAesKey);
      const pack = {
        v: 1,
        key: arrayBufferToBase64(encAesKey),
        iv: arrayBufferToBase64(iv.buffer),
        ct: arrayBufferToBase64(aesCt),
      };
      return btoa(JSON.stringify(pack));
    }

    async function hybridDecrypt(packedBase64, myPrivateKey) {
      const json = atob(packedBase64.trim());
      const pack = JSON.parse(json);
      if (pack.v !== 1) throw new Error('版本不支持');
      const encAesKey = base64ToArrayBuffer(pack.key);
      const iv = new Uint8Array(base64ToArrayBuffer(pack.iv));
      const aesCt = base64ToArrayBuffer(pack.ct);
      const rawAesKey = await crypto.subtle.decrypt({ name: 'RSA-OAEP' }, myPrivateKey, encAesKey);
      const aesKey = await crypto.subtle.importKey('raw', rawAesKey, AES_PARAMS, false, ['decrypt']);
      const plainBuffer = await crypto.subtle.decrypt({ name: 'AES-GCM', iv }, aesKey, aesCt);
      return new TextDecoder().decode(plainBuffer);
    }

    // ========== 操作处理 ==========
    async function handleEncryptSend() {
      if (!currentContactId || !myKeyPair) return;
      const plaintext = messageInput.value.trim();
      if (!plaintext) return showToast('请输入消息','error');
      try {
        const pubKey = await getContactPublicKey(currentContactId);
        const ciphertext = await hybridEncrypt(plaintext, pubKey);
        cipherOutput.textContent = ciphertext;
        btnCopyCipher.classList.remove('hidden');
        addMessageToHistory(currentContactId, plaintext, 'out');
        messageInput.value = '';
        showToast('✅ 加密成功，请复制密文发送','success');
      } catch (e) {
        showToast('加密失败: ' + e.message, 'error');
      }
    }

    async function handlePasteDecrypt() {
      if (!currentContactId || !myKeyPair) return;
      let ciphertext;
      try {
        ciphertext = await navigator.clipboard.readText();
      } catch {
        ciphertext = prompt('请粘贴密文:');
      }
      if (!ciphertext || !ciphertext.trim()) return;
      try {
        const plaintext = await hybridDecrypt(ciphertext.trim(), myKeyPair.privateKey);
        addMessageToHistory(currentContactId, plaintext, 'in');
        showToast('✅ 解密成功','success');
      } catch (e) {
        showToast('解密失败：密钥不匹配或密文损坏','error');
      }
    }

    // ========== 事件绑定 ==========
    document.getElementById('btnAddContact').addEventListener('click', openAddContactModal);
    document.getElementById('btnCancelModal').addEventListener('click', () => contactModal.classList.add('hidden'));
    document.getElementById('btnSaveContact').addEventListener('click', saveContactFromModal);
    document.getElementById('btnKeyMgr').addEventListener('click', () => keyModal.classList.remove('hidden'));
    document.getElementById('btnGenerateKey').addEventListener('click', async () => {
      if (myKeyPair) {
        if (!confirm('已有密钥对，生成新密钥将无法解密旧消息。继续？')) return;
      }
      await generateMyKeyPair();
    });
    document.getElementById('btnCopyMyPub').addEventListener('click', async () => {
      const pub = await exportMyPubBase64();
      if (pub) await copyText(pub);
    });
    document.getElementById('btnExportPriv').addEventListener('click', async () => {
      privKeyArea.classList.toggle('hidden');
      if (!privKeyArea.classList.contains('hidden')) {
        const priv = await exportMyPrivBase64();
        privKeyDisplay.textContent = priv || '';
      }
    });
    document.getElementById('btnCopyPriv').addEventListener('click', () => {
      if (privKeyDisplay.textContent) copyText(privKeyDisplay.textContent);
    });
    document.getElementById('btnImportPriv').addEventListener('click', async () => {
      const val = importPrivInput.value.trim();
      if (!val) return showToast('请粘贴私钥','error');
      try {
        await importMyPrivKey(val);
        importPrivInput.value = '';
        showToast('✅ 私钥已恢复','success');
      } catch { showToast('私钥格式无效','error'); }
    });
    document.getElementById('btnEncryptSend').addEventListener('click', handleEncryptSend);
    document.getElementById('btnPasteDecrypt').addEventListener('click', handlePasteDecrypt);
    document.getElementById('btnCopyCipher').addEventListener('click', () => {
      if (cipherOutput.textContent) copyText(cipherOutput.textContent);
    });

    // 关闭弹窗（点击背景）
    contactModal.addEventListener('click', (e) => { if (e.target === contactModal) contactModal.classList.add('hidden'); });
    keyModal.addEventListener('click', (e) => { if (e.target === keyModal) keyModal.classList.add('hidden'); });

    // 输入框回车发送
    messageInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        handleEncryptSend();
      }
    });

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    // ========== 初始化 ==========
    (async () => {
      loadContacts();
      const hasKey = await loadMyKeyPair();
      updateMyKeyStatus();
      if (!hasKey) {
        showToast('💡 请先生成密钥对（点击🔑）');
      }
      if (contacts.length > 0 && !currentContactId) {
        currentContactId = contacts[0].id;
      }
      renderContactList();
      renderChatWindow();
    })();
  })();
</script>
</body>
</html>
